version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: EnergyDrinks
    environment:
      MYSQL_ROOT_PASSWORD: "root"
      MYSQL_DATABASE: "drinks"
      MYSQL_USER: "dealer"
      MYSQL_PASSWORD: "my_password"
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-init:/docker-entrypoint-initdb.d
